security:
    # Algorithme de hashage des mots de passe
    # 'auto' selectionne automatiquement le meilleur algorithme disponible
    password_hashers:
        App\Entity\Adherent: 'auto'

    # Provider : comment Symfony charge les utilisateurs
    # Ici on utilise notre entite User via Doctrine
    providers:
        adherent_provider:
            entity:
                class: App\Entity\Adherent
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        
        # Firewall pour le login - pas de JWT ici, c'est le point d'entree
        login:
            pattern: ^/api/login
            stateless: true
            provider: adherent_provider
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall pour l'inscription - public, pas de JWT
        register:
            pattern: ^/api/register
            stateless: true

        # Firewall principal pour l'API
        api:
            pattern: ^/api
            stateless: true
            provider: adherent_provider
            jwt: ~

    # Regles d'acces aux routes
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }

        - { path: ^/api/admin, roles: ROLE_ADMIN }

        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\Adherent: 'auto'
            cost: 4 # Réduit le coût pour les tests, accélérant les hashages de mots de passe
            time_cost: 3 # Réduit le temps de calcul pour les tests, accélérant les hashages de mots de passe
            memory_cost: 10 # cest pour le bcrypt, mais 'auto' choisira le meilleur algorithme disponible, donc ces options seront ignorées si un autre algorithme est utilisé.